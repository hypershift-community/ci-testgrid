apiVersion: batch/v1
kind: CronJob
metadata:
  name: cijobs-scraper
spec:
  schedule: "*/15 * * * *"  # Run every 15 minutes
  concurrencyPolicy: Forbid  # Don't run new jobs if previous one is still running
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: cijobs-scraper
            image: quay.io/hypershift/ci-scraper:2026-07-02
            imagePullPolicy: Always
            env:
            - name: MONGODB_HOST
              value: "mongodb"
            - name: SKIP_ARTIFACTS
              value: "1"
            resources:
              requests:
                cpu: "100m"
                memory: "256Mi"
          restartPolicy: OnFailure 